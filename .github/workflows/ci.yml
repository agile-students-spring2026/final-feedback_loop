name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master] 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./back-end
        run: npm install

      - name: Run tests
        working-directory: ./back-end
        env:
          DB_CONNECTION_STRING: mongodb://localhost:27017/feedback_loop
          JWT_SECRET: ci-test-secret
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_SECRET_KEY: fake-key-for-ci
        run: npm test